name: Deploy to imaging.fanoni.ai

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # OHIF build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        working-directory: platform/app
        run: yarn install --frozen-lockfile

      - name: Build OHIF
        working-directory: platform/app
        env:
          NODE_ENV: production
          APP_CONFIG: config/default.js
          PUBLIC_URL: /
        run: yarn build

      - name: Deploy static files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: platform/app/dist/*
          target: /var/www/imaging.fanoni.ai/
          strip_components: 3

      - name: Reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            nginx -t && systemctl reload nginx
            echo "Deployed imaging.fanoni.ai at $(date)"
