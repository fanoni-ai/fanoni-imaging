name: Deploy to imaging.fanoni.ai

on:
  push:
    branches: [master]
  workflow_dispatch:

# Never let two deploys race; cancel an in-flight one when a newer push lands.
concurrency:
  group: deploy-imaging
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40 # OHIF build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: 'yarn'

      # Install the entire workspace from the repo ROOT. platform/app depends on
      # hoisted root deps and sibling @ohif/* packages, so installing inside the
      # child dir leaves the build unable to resolve them.
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build OHIF viewer
        working-directory: platform/app
        env:
          NODE_ENV: production
          APP_CONFIG: config/default.js
          PUBLIC_URL: /
        run: yarn build:viewer

      - name: Deploy static files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'deploy' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: platform/app/dist/*
          target: /var/www/imaging.fanoni.ai/
          strip_components: 3
          overwrite: true

      - name: Reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'deploy' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo nginx -t && sudo systemctl reload nginx
            echo "Deployed imaging.fanoni.ai at $(date -u)"
