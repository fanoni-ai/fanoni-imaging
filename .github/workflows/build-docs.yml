name: Build and Deploy Docs

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Install root workspace dependencies
        run: bun install

      - name: Install docs dependencies
        working-directory: platform/docs
        run: bun install

      - name: Build docs
        working-directory: platform/docs
        env:
          BASE_URL: /
          NODE_OPTIONS: --max-old-space-size=4096
        run: bun run build

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: platform/docs/build/*
          target: /var/www/docin.fanoni.ai/
          strip_components: 3
          rm: true

      - name: Reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: nginx -t && systemctl reload nginx && echo "Deployed docs.fanoni.ai"
