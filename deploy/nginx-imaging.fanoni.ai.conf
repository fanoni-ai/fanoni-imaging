# nginx config for imaging.fanoni.ai
# Install: cp deploy/nginx-imaging.fanoni.ai.conf /etc/nginx/sites-available/imaging.fanoni.ai
#          ln -s /etc/nginx/sites-available/imaging.fanoni.ai /etc/nginx/sites-enabled/
#          certbot --nginx -d imaging.fanoni.ai
#          systemctl reload nginx

server {
    listen 80;
    server_name imaging.fanoni.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name imaging.fanoni.ai;

    ssl_certificate     /etc/letsencrypt/live/imaging.fanoni.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/imaging.fanoni.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/imaging.fanoni.ai;
    index index.html;

    # DICOMweb — proxy to local Orthanc container
    location /dicomweb/ {
        proxy_pass         http://localhost:8042/dicom-web/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
        # Large DICOM series can be slow
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Orthanc REST admin (internal only — remove or restrict in production)
    location /pacs/ {
        proxy_pass       http://localhost:8042/;
        proxy_set_header Host $host;
        # Restrict to VPN/internal IPs in production:
        # allow 10.0.0.0/8;
        # deny all;
    }

    # SPA fallback for OHIF client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
