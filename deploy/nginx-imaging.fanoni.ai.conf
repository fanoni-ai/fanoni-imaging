# nginx config for imaging.fanoni.ai
#
# Install:
#   cp deploy/nginx-imaging.fanoni.ai.conf /etc/nginx/sites-available/imaging.fanoni.ai
#   ln -s /etc/nginx/sites-available/imaging.fanoni.ai /etc/nginx/sites-enabled/
#
#   # Create the Orthanc auth snippet (NOT committed — it holds credentials).
#   # ORTHANC_USERNAME/ORTHANC_PASSWORD must match docker/.env:
#   mkdir -p /etc/nginx/snippets
#   printf 'proxy_set_header Authorization "Basic %s";\n' \
#     "$(printf '%s' "$ORTHANC_USERNAME:$ORTHANC_PASSWORD" | base64)" \
#     > /etc/nginx/snippets/fanoni-orthanc-auth.conf
#
#   certbot --nginx -d imaging.fanoni.ai
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name imaging.fanoni.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name imaging.fanoni.ai;

    ssl_certificate     /etc/letsencrypt/live/imaging.fanoni.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/imaging.fanoni.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/imaging.fanoni.ai;
    index index.html;

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # OHIF can use SharedArrayBuffer (multithreaded codecs) when cross-origin isolated.
    # Enable only if every sub-resource is same-origin or sends CORP, else loads break:
    # add_header Cross-Origin-Opener-Policy "same-origin" always;
    # add_header Cross-Origin-Embedder-Policy "require-corp" always;

    gzip on;
    gzip_types application/javascript application/json application/wasm text/css image/svg+xml;
    gzip_min_length 1024;

    # DICOMweb — public READ-ONLY proxy to the loopback-bound Orthanc container.
    # Writes (STOW / DELETE) are blocked here; ingestion happens server-side only.
    location /dicomweb/ {
        limit_except GET HEAD OPTIONS { deny all; }

        # Inject Orthanc credentials. The snippet is created at install time (see header)
        # and is intentionally not in the repo. If it is missing, `nginx -t` fails closed.
        include /etc/nginx/snippets/fanoni-orthanc-auth.conf;

        proxy_pass         http://127.0.0.1:8042/dicom-web/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 300s;   # large DICOM series can be slow
        proxy_send_timeout 300s;
    }

    # The Orthanc admin REST API is deliberately NOT exposed publicly.
    # Reach it over an SSH tunnel instead:
    #   ssh -L 8042:127.0.0.1:8042 deploy@imaging.fanoni.ai
    #   then open http://localhost:8042/  (Basic auth = ORTHANC_USERNAME/ORTHANC_PASSWORD)

    # Cache fingerprinted static assets aggressively; index.html is never cached.
    location ~* \.(?:js|css|woff2?|png|svg|wasm)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback for OHIF client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
